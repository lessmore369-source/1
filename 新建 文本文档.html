<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心动告白</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#15102a;
    font-family:"微软雅黑";
}
.popup{
    position:fixed;
    padding:10px 18px;
    border-radius:30px;
    background:#fff;
    font-size:14px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.6s;
}
</style>
</head>
<body>

<script>
const messages=["💗 好好爱自己","🌸 多喝温水","✨ 顺心顺意","🌙 我想你了","🍀 别熬夜","💖 你值得被爱"];
let cards=[];

function createCard(text){
    let d=document.createElement("div");
    d.className="popup";
    d.innerText=text;
    document.body.appendChild(d);
    return d;
}

// 爱心公式
function heart(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
    }
}

function start(){
    let cx=window.innerWidth/2;
    let cy=window.innerHeight/2;
    let scale=10;

    for(let i=0;i<80;i++){
        let t=i*2*Math.PI/80;
        let p=heart(t);
        let card=createCard(messages[Math.floor(Math.random()*messages.length)]);

        card.style.left=(cx+p.x*scale)+"px";
        card.style.top=(cy-p.y*scale)+"px";

        cards.push(card);
    }

    // 2秒后散开
    setTimeout(()=>{
        cards.forEach(c=>{
            c.style.left=Math.random()*window.innerWidth+"px";
            c.style.top=Math.random()*window.innerHeight+"px";
            c.style.opacity=0;
        });
    },2000);
}

start();
</script>

</body>
</html>
